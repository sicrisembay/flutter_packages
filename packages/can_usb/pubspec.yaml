name: can_usb
description: >-
  A Flutter package for communicating with a USB-CANFD adapter over serial.
  Provides a serial transport layer, binary frame builder/parser, and a
  high-level CanusbDevice API for sending and receiving CAN frames.
version: 0.1.0
homepage: https://github.com/sicrisembay/flutter_packages/tree/main/packages/can_usb
repository: https://github.com/sicrisembay/flutter_packages/tree/main/packages/can_usb
issue_tracker: https://github.com/sicrisembay/flutter_packages/issues
topics:
  - can-bus
  - serial
  - hardware
  - iot

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_libserialport: ^0.6.0
  synchronized: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
